---
layout: default
title: Archive
---

<section class="archive_list">
  {% for post in site.posts %}
  <div class="post_title">
    <a href="{{ post.url | relative_url }}">{{ post.title | downcase }}</a>
    <span class="date">{{ post.date | date: "%-d %b, %Y" }}</span>
  </div>
  {% endfor %}
</section>
